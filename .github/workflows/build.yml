name: Build Debug APK
on:
  push:
    branches: [ main, master, fix/** ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"
      - uses: actions/checkout@v4
      - name: Initialize submodules
        run: |
          git submodule update --init --recursive 2>&1 || echo "WARNING: Some submodules failed to initialize, continuing..."
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload APK to Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET="app/build/outputs/apk/debug/app-debug.apk"
          echo "Looking for APK at: $ASSET"
          ls -la app/build/outputs/apk/debug/ 2>&1
          if [ -f "$ASSET" ]; then
            echo "Uploading APK to release..."
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary "@$ASSET" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/333114968/assets?name=AxiomAI-debug.apk")
            echo "Response: $RESP"
          else
            echo "APK file not found!"
          fi
      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build.log